<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gioia Mundo</title>
<meta name="description" content="Gioia Mundo — street art origins." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0c10;
  --text:#f5f7ff;
  --muted:#b8bfd8;
  --line:#232843;
  --card: rgba(18,20,32,.75);
  --glass: rgba(0,0,0,.40);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 20% 10%, rgba(124,92,255,.22), transparent 60%),
    radial-gradient(700px 500px at 90% 20%, rgba(46,229,157,.14), transparent 55%),
    linear-gradient(180deg,#070810,var(--bg));
}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
.layout{
  display:grid;
  gap:20px;
  grid-template-columns: 640px 1fr;
  align-items:start;
}
@media(max-width:960px){
  .layout{grid-template-columns:1fr}
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:26px;
  overflow:hidden;
}

/* MAP */
.mapCard{padding:14px}
